<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Page Not Found | M Essack &amp; Associates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d4af35",
                        "background-dark": "#201d12",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased min-h-screen flex flex-col items-center justify-center px-4">
    <div class="text-center max-w-md">
        <p class="text-primary font-bold uppercase tracking-widest text-sm mb-4">Error 404</p>
        <h1 class="text-5xl font-black mb-4">Page Not Found</h1>
        <p class="text-slate-400 mb-8 leading-relaxed">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a class="inline-block bg-primary text-background-dark px-8 py-3 rounded-lg font-bold text-sm uppercase tracking-widest hover:bg-primary/90 transition-all" href="/">
            Back to Home
        </a>
    </div>
    <footer class="absolute bottom-8 text-xs text-slate-600 uppercase tracking-widest">
        &copy; 2025 M Essack &amp; Associates
    </footer>
</body>
</html>
